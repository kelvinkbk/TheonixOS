name: Build Custom Pacman Repository

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-repo.yml'
      - 'thaid/**'
      - 'packages/**'
      - 'theonix-store/**'
  workflow_dispatch:

jobs:
  build-repo:
    runs-on: ubuntu-latest

    # Cancel any in-progress build so new pushes don't pile up
    concurrency:
      group: "pages"
      cancel-in-progress: true

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Packages (Arch Linux)
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:base-devel
          options: -v ${{ github.workspace }}:/workdir -w /workdir
          run: |
            set -ex
            # Enable multilib for wine
            sed -i '/\[multilib\]/,/Include = /s/^#//' /etc/pacman.conf
            
            # Update system and install dependencies
            pacman -Syu --noconfirm git rust cargo sudo dbus sqlite pipewire-jack qt6-multimedia-ffmpeg
            
            # Create a non-root user for makepkg
            useradd -m builduser
            echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
            chown -R builduser:builduser /workdir
            
            # Setup repository directory
            mkdir -p /workdir/repo/x86_64
            
            # Build and install debtap from AUR
            cd /tmp
            sudo -u builduser git clone https://aur.archlinux.org/debtap.git
            cd debtap
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            sudo pacman -U --noconfirm *.pkg.tar.zst
            
            # Build thaid
            cd /workdir/packages/thaid
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            
            # Build theonix-config
            cd /workdir/packages/theonix-config
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            
            # Build theonix-uacl
            cd /workdir/packages/theonix-uacl
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            sudo pacman -U --noconfirm *.pkg.tar.zst
            
            # Build theonix-app-manager
            cd /workdir/packages/theonix-app-manager
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/

            # Build theonix-store
            cd /workdir/packages/theonix-store
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            
            # Build theonix-welcome
            cd /workdir/packages/theonix-welcome
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            
            # Build theonix-release
            cd /workdir/packages/theonix-release
            sudo -u builduser makepkg -s --noconfirm
            cp *.pkg.tar.zst /workdir/repo/x86_64/
            
            # Generate the repository database
            cd /workdir/repo/x86_64
            repo-add theonix.db.tar.gz *.pkg.tar.zst

      - name: Fix file permissions after Docker build
        run: sudo chown -R $USER:$USER ./repo || true

      - name: Add .nojekyll to bypass Jekyll processing
        run: touch ./repo/.nojekyll

      - name: Copy website to repo root
        run: cp -r website/* ./repo/

      - name: Deploy repo to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "ci: update pacman repo [skip ci]"
