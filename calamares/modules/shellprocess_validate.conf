#
# Theonix OS — Post-install validation.
# Verifies installed system integrity before unmounting.
# Aborts installation if critical files are missing.
---
dontChroot: true
timeout: 60
script:
  - "ROOT=\"${ROOT}\" bash /etc/calamares/modules/validate-install.sh"
