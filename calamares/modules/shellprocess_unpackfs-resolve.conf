#
# Theonix OS — Dynamic airootfs.sfs resolver.
# Finds the SquashFS image at runtime and writes the real path into
# unpackfs.conf so Calamares always unpacks the correct file,
# regardless of boot method (normal, copytoram, Ventoy, etc.).
---
dontChroot: true
timeout: 30
script:
  - "bash -c 'SOURCE=$(find /run/archiso -name airootfs.sfs 2>/dev/null | head -n1); if [ -z \"$SOURCE\" ]; then echo \"ERROR: Cannot locate airootfs.sfs anywhere under /run/archiso/\"; exit 1; fi; echo \"Found airootfs.sfs at: $SOURCE\"; printf \"---\\nunpack:\\n    - source: \\\"%s\\\"\\n      sourcefs: \\\"squashfs\\\"\\n      destination: \\\"\\\"\\n\" \"$SOURCE\" > /etc/calamares/modules/unpackfs.conf; echo \"Wrote unpackfs.conf with dynamic source path\"; cat /etc/calamares/modules/unpackfs.conf'"
