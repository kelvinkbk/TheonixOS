#
# Unpackfs module configuration for Theonix OS.
# Extracts the live SquashFS image to the target partition.
---
unpack:
    - source: "/run/archiso/bootmnt/theonix/x86_64/airootfs.sfs"
      sourcefs: "squashfs"
      destination: ""
