#
# Unpackfs module configuration for Theonix OS.
# This file is overwritten at runtime by shellprocess@unpackfs-resolve
# with the dynamically detected airootfs.sfs path.
---
unpack:
    - source: "/run/archiso/airootfs.sfs"
      sourcefs: "squashfs"
      destination: ""
