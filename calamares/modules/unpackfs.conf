#
# Unpackfs module configuration for Theonix OS.
# Extracts the live SquashFS image to the target partition.
#
# The canonical path is guaranteed by a boot-time systemd service
# (theonix-sfs-resolve.service) that creates a symlink if the ISO
# was booted via copytoram or Ventoy.
---
unpack:
    - source: "/run/archiso/bootmnt/theonix/x86_64/airootfs.sfs"
      sourcefs: "squashfs"
      destination: ""
