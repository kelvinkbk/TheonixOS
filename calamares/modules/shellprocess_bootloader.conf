#
# Theonix OS — Bootloader installation via shellprocess.
# Replaces the native bootloader module for full control and logging.
---
dontChroot: true
timeout: 300
script:
  - "ROOT=\"${ROOT}\" bash /etc/calamares/modules/bootloader-install.sh"
