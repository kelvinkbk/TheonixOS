#
# Bootloader module configuration for Theonix OS.
# Installs GRUB for the installed system (not the live ISO which uses systemd-boot).
---
efiBootLoader: "grub"

efiBootloaderId: "theonix"
gsName: "partitions"

kernel: "/vmlinuz-linux"

img: "/initramfs-linux.img"

fallback: "/initramfs-linux-fallback.img"

timeout: 3

grubInstall: "/usr/local/bin/grub-install-wrapper"

grubProbe: true

efiDirectory: "/boot/efi"

installEFIFallback: true
