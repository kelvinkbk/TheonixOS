#
# Theonix OS — shellprocess config for initcpio generation.
# Replaces the built-in initcpiocfg + initcpio C++ modules with a
# shell-based equivalent that works with all Calamares builds.
---
dontChroot: false
timeout: 300

script:
  - "-mkinitcpio -P"
