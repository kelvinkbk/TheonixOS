# =============================================================================
# Theonix OS — Calamares Main Settings
# =============================================================================
# This file controls the overall Calamares installer behavior.
# Reference: https://github.com/calamares/calamares/wiki/

# Brand definition directory (must contain branding.desc)
branding: theonix

# Disable the Cancel button during package installation
disable-cancel: false
disable-cancel-during-exec: true

# Prompt before starting the install sequence
prompt-install: true

# Do not run Calamares in OEM setup mode
oem-setup: false

# Do not chroot: always false for a real installer
dont-chroot: false

# Module search paths
modules-search:
  - local
  - /usr/lib/calamares/modules

# =============================================================================
# Instances definition
# =============================================================================
instances:
  - id:       initcpio
    module:   shellprocess
    config:   shellprocess_initcpio.conf
  - id:       theonix-postinstall
    module:   shellprocess
    config:   shellprocess_theonix-postinstall.conf
  - id:       validate
    module:   shellprocess
    config:   shellprocess_validate.conf

# =============================================================================
# Installation sequence
# =============================================================================
sequence:
  # ---- Pages shown to the user (GUI) ----
  - show:
      - welcome          # language, location, keyboard preview
      - locale           # timezone + locale detail
      - keyboard         # keyboard layout picker
      - partition        # disk partitioning
      - users            # user account + hostname
      - summary          # review all choices before committing

  # ---- Execution steps (backend, run sequentially) ----
  - exec:
      - partition        # format + mount partitions
      - mount            # mount /boot/efi
      - unpackfs         # extract the live squashfs to target
      - networkcfg       # copy network config to installed system
      - machineid        # generate /etc/machine-id
      - fstab            # generate /etc/fstab
      - locale           # apply locale settings
      - keyboard         # apply keyboard settings
      - localecfg        # write /etc/locale.gen + locale-gen
      - users            # create user + set passwords
      - displaymanager   # configure SDDM
      - shellprocess@initcpio  # write mkinitcpio.conf + run mkinitcpio -P
      - grubcfg          # write /etc/default/grub
      - bootloader       # Native Calamares GRUB installation module
      - shellprocess@theonix-postinstall  # Theonix custom post-install
      - shellprocess@validate  # verify installed system before unmount
      - umount           # unmount target partitions cleanly

  # ---- Final slide shown after install ----
  - show:
      - finished
